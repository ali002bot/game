<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Study Portal</title>
<style>
body{margin:0;font-family:Arial}
canvas{display:block;margin:auto;background:#111}
</style>
</head>
<body><canvas id="game" width="800" height="500"></canvas>


<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");


let dashboard=false;
let basketball=true;


// ===== OWNER =====
let owner=null, seq=[];
let god=false, chaos=false, magnet=false;


// ===== SCORE =====
let score1=0, score2=0;


// ===== AI =====
let aiLevel=1;


// ===== PLAYERS =====
function make(x){
 return {
  x:x,y:300,vx:0,vy:0,
  angle:0,spin:0,
  arm:Math.random()*6,
  leg:Math.random()*6,
  lean:0
 };
}
let p1=make(150), p2=make(650);
let ball={x:400,y:200,vx:0,vy:0,holder:null};


// ===== SHOOTER =====
let bullets=[];


// INPUT (UNCHANGED)
document.addEventListener("keydown",e=>{
 seq.push(e.key);


 if(e.key==="Tab"){e.preventDefault();dashboard=!dashboard;}
 if(e.key==="p") basketball=!basketball;


 if(!owner){
  if(JSON.stringify(seq.slice(-5))===JSON.stringify(["w","w","s","d","f"])) owner="p1";
  if(JSON.stringify(seq.slice(-4))===JSON.stringify(["ArrowUp","ArrowUp","ArrowDown","ArrowRight"])) owner="p2";
 }


 if(owner){
  let s=seq.join("");
  if(s.includes("wsw")) god=!god;
  if(s.includes("adad")) chaos=!chaos;
  if(s.includes("sdsd")) magnet=!magnet;
  if(s.includes("wdwd")){
   if(owner==="p1") score1++;
   if(owner==="p2") score2++;
  }
 }


 if(basketball){
  if(e.key==="w") jump(p1);
  if(e.key==="ArrowUp") jump(p2);
 }


 if(!basketball){
  if(e.key==="f") bullets.push({x:p1.x,y:p1.y,dx:6});
  if(e.key==="/") bullets.push({x:p2.x,y:p2.y,dx:-6});
 }
});


function jump(p){
 p.vy=(god&&owner==="p1")?-20:-11;


 if(ball.holder===p){
  ball.holder=null;
  ball.vx=p.vx+(Math.random()*6-3);
  ball.vy=-10;
 }


 p.vx+=Math.random()*10-5;
 p.spin+=Math.random()*2-1;
 p.lean+=Math.random()*1-0.5;
}


// LOOP (UNCHANGED LOGIC)
function loop(){
 requestAnimationFrame(loop);
 ctx.clearRect(0,0,800,500);


 if(dashboard){drawDashboard();return;}


 if(basketball){


  [p1,p2].forEach(p=>{
   p.vy+=0.6;
   p.x+=p.vx;
   p.y+=p.vy;
   p.lean*=0.95;
   p.angle+=p.spin+p.lean;
   p.arm+=Math.random()*0.3-0.15;
   p.leg+=Math.random()*0.3-0.15;
  });


  let speed=Math.min(0.25+aiLevel*0.05,0.6);
  if(ball.x>p2.x) p2.vx+=speed; else p2.vx-=speed;


  if(Math.abs(ball.x-p2.x)<60 && Math.random()<0.02+aiLevel*0.005){
   p2.vy=-10;
  }


  if(ball.holder){
   let p=ball.holder;
   ball.x=p.x;
   ball.y=p.y-20;
  }else{
   ball.vy+=0.6;
   ball.x+=ball.vx;
   ball.y+=ball.vy;
  }


  [p1,p2].forEach(p=>{
   let dx=ball.x-p.x;
   let dy=ball.y-p.y;
   if(Math.sqrt(dx*dx+dy*dy)<35 && !ball.holder){
    ball.holder=p;
   }
  });


  [p1,p2].forEach(p=>{
   if(p.y>350){p.y=350;p.vy*=-0.6;}
  });


  if(ball.y>400){ball.y=400;ball.vy*=-0.7;}
  if(ball.x<0||ball.x>800) ball.vx*=-0.8;


  if(chaos) ball.vx+=Math.random()*1-0.5;
  if(magnet){
   let p=owner==="p1"?p1:p2;
   ball.holder=p;
  }


  [p1,p2].forEach(p=>{
   let dx=ball.x-p.x;
   let dy=ball.y-p.y;
   if(Math.sqrt(dx*dx+dy*dy)<45){
    ball.vx=dx*0.7+(Math.random()*4-2);
    ball.vy=-8;
   }
  });


  if(ball.x>780 && ball.y>200 && ball.y<300){score1++;aiLevel++;reset();}
  if(ball.x<20 && ball.y>200 && ball.y<300){score2++;aiLevel++;reset();}


  if(score1>=5||score2>=5){
   alert((score1>=5?"P1":"P2")+" WINS!");
   score1=0;score2=0;aiLevel=1;
  }


  drawCourt();
  drawPlayer(p1,"cyan");
  drawPlayer(p2,"red");


  ctx.fillStyle="orange";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,10,0,Math.PI*2);
  ctx.fill();


  ctx.fillStyle="white";
  ctx.fillText(score1,50,50);
  ctx.fillText(score2,730,50);
  ctx.fillText("AI:"+aiLevel,350,50);


  return;
 }


 bullets.forEach(b=>b.x+=b.dx);


 ctx.fillStyle="#222";
 ctx.fillRect(0,0,800,500);


 ctx.fillStyle="cyan";
 ctx.fillRect(p1.x,p1.y,20,30);
 ctx.fillStyle="red";
 ctx.fillRect(p2.x,p2.y,20,30);


 ctx.fillStyle="yellow";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5));
}


// RESET
function reset(){
 ball.x=400;ball.y=200;ball.vx=0;ball.vy=0;ball.holder=null;
}


// COURT
function drawCourt(){
 ctx.fillStyle="#222";
 ctx.fillRect(0,0,800,500);
 ctx.fillStyle="white";
 ctx.fillRect(780,200,10,100);
 ctx.fillRect(10,200,10,100);
}


// 🔥 NEW 90% STYLE PLAYER
function drawPlayer(p,color){
 ctx.save();
 ctx.translate(p.x,p.y);
 ctx.rotate(p.angle);


 // BODY (short + thick)
 ctx.fillStyle=color;
 ctx.fillRect(-14,0,28,24);


 // HEAD (bigger)
 ctx.beginPath();
 ctx.arc(0,-14,16,0,Math.PI*2);
 ctx.fill();


 // EYES
 ctx.fillStyle="white";
 ctx.fillRect(-6,-18,4,4);
 ctx.fillRect(2,-18,4,4);


 ctx.strokeStyle=color;
 ctx.lineWidth=8;


 // ARMS (chunky + forward)
 ctx.beginPath();
 ctx.moveTo(0,8);
 ctx.lineTo(Math.cos(p.arm)*28+5, Math.sin(p.arm)*28);
 ctx.stroke();


 ctx.beginPath();
 ctx.moveTo(0,8);
 ctx.lineTo(-Math.cos(p.arm)*28-5, Math.sin(p.arm)*28);
 ctx.stroke();


 // LEGS (short + thick)
 ctx.lineWidth=10;


 ctx.beginPath();
 ctx.moveTo(-6,24);
 ctx.lineTo(Math.sin(p.leg)*15,45);
 ctx.stroke();


 ctx.beginPath();
 ctx.moveTo(6,24);
 ctx.lineTo(-Math.sin(p.leg)*15,45);
 ctx.stroke();


 ctx.restore();
}


// DASHBOARD
function drawDashboard(){
 ctx.fillStyle="#f8fafc";
 ctx.fillRect(0,0,800,500);
 ctx.fillStyle="#2563eb";
 ctx.fillRect(0,0,800,60);
 ctx.fillStyle="white";
 ctx.fillText("Study Portal",20,35);
 ctx.fillStyle="#111";
 ctx.fillText("Assignments",300,150);
 ctx.fillText("Press TAB to return",300,400);
}


loop();
</script></body>
</html>
