<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>Study Portal</title>
<style>
body{margin:0;font-family:Arial}
canvas{display:block;margin:auto;background:#111}
</style>
</head>
<body><canvas id="game" width="800" height="500"></canvas>


<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");


let dashboard=false;
let basketball=true;


// ===== OWNER =====
let owner=null, seq=[];
let god=false, chaos=false, magnet=false;


// ===== SCORE =====
let score1=0, score2=0;


// ===== AI =====
let aiLevel=1;


// ===== PLAYERS =====
function make(x){
 return {x:x,y:300,vx:0,vy:0,angle:0,spin:0,arm:0,leg:0};
}
let p1=make(150), p2=make(650);
let ball={x:400,y:200,vx:0,vy:0};


// ===== SHOOTER =====
let bullets=[];


// INPUT
document.addEventListener("keydown",e=>{
 seq.push(e.key);


 if(e.key==="Tab"){
  e.preventDefault();
  dashboard=!dashboard;
 }


 if(e.key==="p") basketball=!basketball;


 // OWNER
 if(!owner){
  if(JSON.stringify(seq.slice(-5))===JSON.stringify(["w","w","s","d","f"])) owner="p1";
  if(JSON.stringify(seq.slice(-4))===JSON.stringify(["ArrowUp","ArrowUp","ArrowDown","ArrowRight"])) owner="p2";
 }


 // CHEATS
 if(owner){
  let s=seq.join("");
  if(s.includes("wsw")) god=!god;
  if(s.includes("adad")) chaos=!chaos;
  if(s.includes("sdsd")) magnet=!magnet;


  if(s.includes("wdwd")){
   if(owner==="p1") score1++;
   if(owner==="p2") score2++;
  }
 }


 // JUMP
 if(basketball){
  if(e.key==="w") jump(p1);
  if(e.key==="ArrowUp") jump(p2);
 }


 // SHOOTER
 if(!basketball){
  if(e.key==="f") bullets.push({x:p1.x,y:p1.y,dx:6});
  if(e.key==="/") bullets.push({x:p2.x,y:p2.y,dx:-6});
 }
});


function jump(p){
 p.vy = (god && owner==="p1") ? -22 : -12;
 p.vx += Math.random()*14-7;
 p.spin += Math.random()*2-1;
}


// LOOP
function loop(){
 requestAnimationFrame(loop);
 ctx.clearRect(0,0,800,500);


 if(dashboard){
  drawDashboard();
  return;
 }


 // ===== BASKET =====
 if(basketball){


  [p1,p2,ball].forEach(o=>{
   o.vy+=0.7;
   o.x+=o.vx;
   o.y+=o.vy;
  });


  // 🧠 SMART AI
  let speed = 0.3 + aiLevel*0.15;


  if(ball.x > p2.x) p2.vx += speed;
  else p2.vx -= speed;


  // smarter jumping
  if(Math.abs(ball.x - p2.x) < 80 && Math.random() < 0.02 + aiLevel*0.01){
   p2.vy = -12 - aiLevel;
  }


  // rotation
  [p1,p2].forEach(p=>{
   p.angle+=p.spin;
   p.spin*=0.98;
   p.arm+=Math.random()*0.4-0.2;
   p.leg+=Math.random()*0.4-0.2;
  });


  // borders
  [p1,p2].forEach(p=>{
   p.x=Math.max(0,Math.min(780,p.x));
   if(p.y>350){
    p.y=350;
    p.vy*=-0.7;
   }
  });


  if(ball.x<0 || ball.x>800) ball.vx*=-0.8;


  if(ball.y>400){
   ball.y=400;
   ball.vy*=-0.7;
  }


  // cheats
  if(chaos){
   ball.vx+=Math.random()*2-1;
  }


  if(magnet){
   let p=owner==="p1"?p1:p2;
   ball.x=p.x;
   ball.y=p.y;
  }


  // hit
  [p1,p2].forEach(p=>{
   let dx=ball.x-p.x;
   let dy=ball.y-p.y;
   if(Math.sqrt(dx*dx+dy*dy)<40){
    ball.vx=dx*0.7+(Math.random()*4-2);
    ball.vy=-8;
   }
  });


  // SCORE
  if(ball.x>780 && ball.y>200 && ball.y<300){
   score1++;
   aiLevel++; // 🔥 AI GETS SMARTER
   reset();
  }


  if(ball.x<20 && ball.y>200 && ball.y<300){
   score2++;
   aiLevel++; // 🔥 AI GETS SMARTER
   reset();
  }


  // WIN
  if(score1>=5 || score2>=5){
   alert((score1>=5?"P1":"P2")+" WINS!");
   score1=0;
   score2=0;
   aiLevel=1; // reset difficulty
  }


  drawCourt();
  drawPlayer(p1,"cyan");
  drawPlayer(p2,"red");


  ctx.fillStyle="orange";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,10,0,Math.PI*2);
  ctx.fill();


  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText(score1,50,50);
  ctx.fillText(score2,730,50);


  ctx.fillText("AI Lv."+aiLevel,350,50);


  return;
 }


 // ===== SHOOTER =====
 bullets.forEach(b=>b.x+=b.dx);


 ctx.fillStyle="#222";
 ctx.fillRect(0,0,800,500);


 ctx.fillStyle="cyan";
 ctx.fillRect(p1.x,p1.y,20,30);


 ctx.fillStyle="red";
 ctx.fillRect(p2.x,p2.y,20,30);


 ctx.fillStyle="yellow";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5));
}


// RESET
function reset(){
 ball.x=400;
 ball.y=200;
 ball.vx=0;
 ball.vy=0;
}


// DRAW
function drawCourt(){
 ctx.fillStyle="#222";
 ctx.fillRect(0,0,800,500);


 ctx.fillStyle="white";
 ctx.fillRect(780,200,10,100);
 ctx.fillRect(10,200,10,100);
}


function drawPlayer(p,color){
 ctx.save();
 ctx.translate(p.x,p.y);
 ctx.rotate(p.angle);


 ctx.fillStyle=color;
 ctx.fillRect(-10,0,20,30);


 ctx.beginPath();
 ctx.arc(0,-10,12,0,Math.PI*2);
 ctx.fill();


 ctx.strokeStyle=color;
 ctx.lineWidth=5;


 ctx.beginPath();
 ctx.moveTo(0,10);
 ctx.lineTo(Math.cos(p.arm)*30, Math.sin(p.arm)*30);
 ctx.stroke();


 ctx.beginPath();
 ctx.moveTo(0,30);
 ctx.lineTo(Math.sin(p.leg)*20,50);
 ctx.stroke();


 ctx.restore();
}


function drawDashboard(){
 ctx.fillStyle="#f8fafc";
 ctx.fillRect(0,0,800,500);


 ctx.fillStyle="#2563eb";
 ctx.fillRect(0,0,800,60);


 ctx.fillStyle="white";
 ctx.font="20px Arial";
 ctx.fillText("Study Portal",20,35);


 ctx.fillStyle="#111";
 ctx.fillText("Assignments",300,150);
 ctx.fillText("Math Practice",300,180);


 ctx.fillText("Press TAB to return",300,400);
}


loop();
</script></body>
</html>
