<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Drive - Google Drive</title>
    <link rel="icon" type="image/png" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'My Drive','short_name':'Drive','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#ffffff'}">


    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* THE MAIN HUB INTERFACE */
        #main-interface { width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; }
        .drive-header { height: 64px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 20px; }
        .drive-logo { display: flex; align-items: center; gap: 12px; color: #5f6368; font-size: 18px; }


        /* THE HIDDEN LAYERS */
        .layer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; }
        #vault-layer { background: #111; color: white; padding: 40px; box-sizing: border-box; flex-direction: column; }
        #game-view { background: #000; }
        
        /* THE "EMBRY SOCIAL STUDIES" FREEZE */
        #freeze-layer { background: #fff; z-index: 9999; }
        
        iframe { width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .tile { background: #222; border: 1px solid #333; padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .tile:hover { background: #34a853; }
    </style>
</head>
<body onclick="if(!document.fullscreenElement)document.documentElement.requestFullscreen()">


    <div id="main-interface">
        <div class="drive-header">
            <div class="drive-logo">
                <img src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" height="24">
                <span>Drive</span>
            </div>
        </div>
        <div style="padding: 40px;">
            <h2 style="font-weight:normal;">Quick Access</h2>
            <p style="color: #666;">No recent files to show. Use 'Alt + Space' to begin.</p>
        </div>
    </div>


    <div id="vault-layer" class="layer">
        <h1>GMS_HOST_V1</h1>
        <div class="grid" id="game-grid">
            </div>
    </div>


    <div id="game-view" class="layer">
        <iframe id="game-frame"></iframe>
    </div>


    <div id="freeze-layer" class="layer">
        <div style="padding: 20px; font-family: Arial;">
            <h2 style="border-bottom: 1px solid #ddd; padding-bottom: 10px;">450190-1 12 Social Studies 7 - Embry > Assignments</h2>
            <p style="color: #0081bd; font-weight: bold;">Reformation Knowledge Check #1</p>
            <p style="font-size: 12px; color: #666;">Due Mar 27 at 11:59pm | 13/37 pts</p>
            <hr>
            <p style="color: #0081bd; font-weight: bold;">Renaissance Knowledge Check #2</p>
            <p style="font-size: 12px; color: #666;">Due Mar 10 at 11:59pm | -/39 pts</p>
        </div>
    </div>


<script>
    const layers = {
        vault: document.getElementById('vault-layer'),
        game: document.getElementById('game-view'),
        freeze: document.getElementById('freeze-layer')
    };
    const frame = document.getElementById('game-frame');


    const games = [
        {name: "Roblox", url: "https://now.gg/play/roblox-corporation/5349/roblox"},
        {name: "911 Games", url: "https://911games.io"},
        {name: "BeamNG", url: "https://ubg76.github.io/beamng-drive/"},
        {name: "Basket Random", url: "https://basketrandom.com"}
    ];


    function init() {
        const grid = document.getElementById('game-grid');
        games.forEach(g => {
            let d = document.createElement('div'); d.className = 'tile'; d.innerText = g.name;
            d.onclick = () => { 
                hideAll(); 
                layers.game.style.display = 'block'; 
                frame.src = g.url; 
            };
            grid.appendChild(d);
        });
    }


    function hideAll() { Object.values(layers).forEach(l => l.style.display = 'none'); }


    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        
        if (e.altKey && e.code === "Space") {
            e.preventDefault();
            hideAll();
            layers.vault.style.display = 'flex';
        }


        if (e.altKey && key === 'z') {
            e.preventDefault();
            hideAll();
            frame.src = ""; // Nuke sound
            layers.freeze.style.display = 'block';
        }


        if (e.altKey && key === 'q') window.location.href = "https://boone.instructure.com/login/canvas";
    });


    init();
</script>
</body>
</html>
