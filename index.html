<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>IXL | Learn</title>
<link rel="icon" href="https://www.ixl.com/favicon.ico">
<style>
body{margin:0;background:#0f172a;color:white;text-align:center}
canvas{display:block;margin:auto;background:#111}
</style>
</head>
<body><canvas id="gameCanvas" width="800" height="500"></canvas>


<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");


// ===== MODES =====
let basketballMode=false;


// ===== SHOOTER GAME =====
let p1={x:100,y:200,w:30,h:30,health:100,score:0};
let p2={x:650,y:200,w:30,h:30,health:100,score:0};


let bullets=[];
let keys={};
let p1Cooldown=0,p2Cooldown=0;


const walls=[
 {x:300,y:100,w:20,h:300},
 {x:500,y:0,w:20,h:200},
 {x:500,y:300,w:20,h:200}
];


// ===== CHEATS =====
let rapidFire=false;
let infiniteHealth=false;


// ===== BASKET RANDOM =====
let ball={x:400,y:200,vx:0,vy:0};
let brP1={x:150,y:300,vx:0,vy:0};
let brP2={x:650,y:300,vx:0,vy:0};
let gravity=0.5;
let bounce=-0.7;
let courtColor="#222";


// ===== INPUT =====
window.addEventListener("keydown",e=>{
 keys[e.key]=true;


 // toggle basketball
 if(e.altKey && e.key.toLowerCase()==="o"){
  basketballMode=true;
  resetBasket();
 }


 // exit mode
 if(e.key==="Escape"){
  basketballMode=false;
 }


 // basketball controls
 if(basketballMode){
  if(e.key==="w"){
   brP1.vy=-10;
   brP1.vx+=(Math.random()-0.5)*12;
  }
  if(e.key==="ArrowUp"){
   brP2.vy=-10;
   brP2.vx+=(Math.random()-0.5)*12;
  }
 }


 // cheat toggle
 if(e.key==="c"){
  rapidFire=!rapidFire;
 }
});


window.addEventListener("keyup",e=>keys[e.key]=false);


// ===== FUNCTIONS =====
function collide(a,b){
 return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}


function shoot(x,y,dir){
 for(let i=-1;i<=1;i++){
  bullets.push({x:x+15,y:y+15+i*5,dir});
 }
}


function resetBasket(){
 ball={x:400,y:200,vx:(Math.random()-0.5)*6,vy:0};
 brP1={x:150,y:300,vx:0,vy:0};
 brP2={x:650,y:300,vx:0,vy:0};


 const colors=["#222","#1a1a2e","#003049","#2b2d42"];
 courtColor=colors[Math.floor(Math.random()*colors.length)];
}


// ===== UPDATE =====
function update(){


 // ===== BASKET MODE =====
 if(basketballMode){


  [brP1,brP2,ball].forEach(o=>{
   o.vy+=gravity;
   o.x+=o.vx;
   o.y+=o.vy;
  });


  brP1.vx*=0.95;
  brP2.vx*=0.95;


  [brP1,brP2].forEach(p=>{
   if(p.y>350){
    p.y=350;
    p.vy*=bounce;
   }
  });


  if(ball.y>400){
   ball.y=400;
   ball.vy*=bounce;
  }


  [brP1,brP2].forEach(p=>{
   let dx=ball.x-p.x;
   let dy=ball.y-p.y;
   let d=Math.sqrt(dx*dx+dy*dy);
   if(d<30){
    ball.vx=dx*0.4;
    ball.vy=-6;
   }
  });


  if(ball.x>770 && ball.y>200 && ball.y<300){
   alert("P1 SCORED!");
   resetBasket();
  }


  if(ball.x<30 && ball.y>200 && ball.y<300){
   alert("P2 SCORED!");
   resetBasket();
  }


  return;
 }


 // ===== SHOOTER =====
 if(keys["w"]) p1.y-=4;
 if(keys["s"]) p1.y+=4;
 if(keys["a"]) p1.x-=4;
 if(keys["d"]) p1.x+=4;


 if(keys["ArrowUp"]) p2.y-=4;
 if(keys["ArrowDown"]) p2.y+=4;
 if(keys["ArrowLeft"]) p2.x-=4;
 if(keys["ArrowRight"]) p2.x+=4;


 p1.x=Math.max(0,Math.min(770,p1.x));
 p1.y=Math.max(0,Math.min(470,p1.y));
 p2.x=Math.max(0,Math.min(770,p2.x));
 p2.y=Math.max(0,Math.min(470,p2.y));


 if(keys["f"] && (p1Cooldown<=0 || rapidFire)){
  shoot(p1.x,p1.y,1);
  p1Cooldown=rapidFire?5:25;
 }


 if(keys["/"] && (p2Cooldown<=0 || rapidFire)){
  shoot(p2.x,p2.y,-1);
  p2Cooldown=rapidFire?5:25;
 }


 if(p1Cooldown>0)p1Cooldown--;
 if(p2Cooldown>0)p2Cooldown--;


 bullets.forEach(b=>b.x+=b.dir*6);


 bullets.forEach((b,i)=>{
  if(collide({x:b.x,y:b.y,w:5,h:5},p1) && !infiniteHealth){
   p1.health-=10;
   bullets.splice(i,1);
  }
  if(collide({x:b.x,y:b.y,w:5,h:5},p2)){
   p2.health-=10;
   bullets.splice(i,1);
  }


  walls.forEach(w=>{
   if(collide({x:b.x,y:b.y,w:5,h:5},w)){
    bullets.splice(i,1);
   }
  });
 });


 if(p1.health<=0){p2.score++;reset();}
 if(p2.health<=0){p1.score++;reset();}
}


function reset(){
 p1.health=100;
 p2.health=100;
 bullets=[];
}


// ===== DRAW =====
function draw(){


 // ===== BASKET MODE =====
 if(basketballMode){
  ctx.fillStyle=courtColor;
  ctx.fillRect(0,0,800,500);


  ctx.fillStyle="white";
  ctx.fillRect(780,200,10,100);
  ctx.fillRect(10,200,10,100);


  drawPlayer(brP1,"cyan");
  drawPlayer(brP2,"red");


  ctx.fillStyle="orange";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,10,0,Math.PI*2);
  ctx.fill();


  return;
 }


 // ===== SHOOTER =====
 ctx.clearRect(0,0,800,500);


 ctx.fillStyle="#444";
 walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));


 ctx.fillStyle="cyan";
 ctx.fillRect(p1.x,p1.y,30,30);


 ctx.fillStyle="red";
 ctx.fillRect(p2.x,p2.y,30,30);


 ctx.fillStyle="yellow";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,5,5));


 ctx.fillStyle="white";
 ctx.fillText("P1:"+p1.score,20,20);
 ctx.fillText("P2:"+p2.score,720,20);
}


// ===== RAGDOLL =====
function drawPlayer(p,color){
 ctx.fillStyle=color;
 ctx.fillRect(p.x,p.y,10,30);


 ctx.beginPath();
 ctx.arc(p.x+5,p.y-5,7,0,Math.PI*2);
 ctx.fill();


 ctx.strokeStyle=color;
 ctx.lineWidth=3;


 ctx.beginPath();
 ctx.moveTo(p.x+5,p.y+30);
 ctx.lineTo(p.x+Math.sin(p.vx)*10,p.y+45);
 ctx.stroke();


 ctx.beginPath();
 ctx.moveTo(p.x+5,p.y+30);
 ctx.lineTo(p.x-Math.sin(p.vx)*10,p.y+45);
 ctx.stroke();
}


// ===== LOOP =====
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script></body>
</html>
