<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>IXL | Learn</title>
<link id="favicon" rel="icon" href="https://www.ixl.com/favicon.ico"><style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;overflow:hidden}


/* DASHBOARD */
#dashboard{text-align:center;padding:20px}
.card{
 background:#1e293b;
 padding:15px;
 margin:10px;
 border-radius:10px;
 cursor:pointer;
 transition:0.2s;
}
.card:hover{background:#334155;transform:scale(1.05)}


/* GAME */
#gameCanvas{display:none;background:black;margin:auto;border:2px solid #444}


/* HUD */
#hud{
 position:absolute;
 top:10px;
 left:10px;
 font-size:14px;
}


/* BARS */
.bar{
 height:10px;
 background:#333;
 border-radius:5px;
 margin:5px 0;
}
.fill{
 height:100%;
 background:lime;
 border-radius:5px;
}


/* FAKE IXL */
#fakeScreen{
 display:none;
 background:#f5f7fa;
 height:100vh;
 color:black;
}
</style></head>
<body><!-- DASHBOARD --><div id="dashboard">
<h1>IXL Dashboard</h1>
<div class="card">Math Grade: 92%</div>
<div class="card">Science Assignment: Complete</div>
<div class="card">History Notes Updated</div>
</div><!-- FAKE IXL SCREEN --><div id="fakeScreen">
<div style="background:#4CAF50;height:5px;"></div><div style="background:white;padding:20px;border-radius:10px;max-width:800px;margin:auto;margin-top:40px;">
<h3 style="color:#4CAF50;">GG.3 Create and interpret line plots</h3>
<p>Use the line plot to answer the question.</p><div style="height:120px;border-bottom:2px solid black;position:relative;">
<span style="position:absolute;left:100px;top:20px;color:orange;">✖</span>
<span style="position:absolute;left:300px;top:40px;color:orange;">✖</span>
<span style="position:absolute;left:500px;top:10px;color:orange;">✖</span>
</div><input placeholder="Answer..." style="margin-top:20px;padding:10px;width:200px;">
</div>
</div><!-- GAME --><canvas id="gameCanvas" width="800" height="500"></canvas>


<!-- HUD --><div id="hud">
<div>❤️ Health</div>
<div class="bar"><div id="healthBar" class="fill" style="width:100%"></div></div><div>🔫 Ammo</div>
<div class="bar"><div id="ammoBar" class="fill" style="width:100%"></div></div><div id="scoreText">🏆 0</div>
</div><script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');


const dashboard=document.getElementById('dashboard');
const fakeScreen=document.getElementById('fakeScreen');


let gameActive=false,fakeMode=false;


let player={x:100,y:200,w:30,h:30,health:100,ammo:10,maxAmmo:10};
let bullets=[],enemies=[],keys={},score=0;


// TOGGLE FAKE IXL
function toggleFake(){
 fakeMode=!fakeMode;


 dashboard.style.display=fakeMode?'none':'block';
 canvas.style.display='none';
 fakeScreen.style.display=fakeMode?'block':'none';
}


// CONTROLS
window.addEventListener('keydown',e=>{
 keys[e.key]=true;


 if(e.shiftKey && e.key.toLowerCase()==='g'){
  gameActive=true;
  dashboard.style.display='none';
  canvas.style.display='block';
 }


 if(e.key==='Escape'){
  gameActive=false;
  dashboard.style.display='block';
  canvas.style.display='none';
 }


 if(e.altKey && e.key.toLowerCase()==='a'){
  toggleFake();
 }


 if(e.key==='r'){
  player.ammo=player.maxAmmo;
 }
});


window.addEventListener('keyup',e=>keys[e.key]=false);


// SHOOT
window.addEventListener('click',()=>{
 if(gameActive && player.ammo>0){
  bullets.push({x:player.x+30,y:player.y});
  player.ammo--;
 }
});


// ENEMIES
setInterval(()=>{
 enemies.push({x:800,y:Math.random()*500,w:30,h:30,speed:2});
},1500);


// UPDATE
function update(){
 if(!gameActive) return;


 if(keys['w']) player.y-=4;
 if(keys['s']) player.y+=4;
 if(keys['a']) player.x-=4;
 if(keys['d']) player.x+=4;


 player.x=Math.max(0,Math.min(770,player.x));
 player.y=Math.max(0,Math.min(470,player.y));


 bullets.forEach(b=>b.x+=8);


 enemies.forEach(e=>{
  let dx=player.x-e.x;
  let dy=player.y-e.y;
  let d=Math.sqrt(dx*dx+dy*dy);
  e.x+=(dx/d)*e.speed;
  e.y+=(dy/d)*e.speed;
 });


 bullets.forEach((b,bi)=>{
  enemies.forEach((e,ei)=>{
   if(b.x<e.x+30 && b.y<e.y+30){
    enemies.splice(ei,1);
    bullets.splice(bi,1);
    score+=10;
   }
  });
 });


 enemies.forEach(e=>{
  if(player.x<e.x+30 && player.y<e.y+30){
   player.health-=0.3;
  }
 });


 document.getElementById('healthBar').style.width=player.health+'%';
 document.getElementById('ammoBar').style.width=(player.ammo/player.maxAmmo*100)+'%';
 document.getElementById('scoreText').innerText='🏆 '+score;


 if(player.health<=0){
  alert("Game Over! Score: "+score);
  location.reload();
 }
}


// DRAW
function draw(){
 if(!gameActive) return;


 ctx.clearRect(0,0,800,500);


 ctx.fillStyle='cyan';
 ctx.fillRect(player.x,player.y,30,30);


 ctx.fillStyle='yellow';
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,10,5));


 ctx.fillStyle='red';
 enemies.forEach(e=>ctx.fillRect(e.x,e.y,30,30));
}


// LOOP
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script></body>
</html>
