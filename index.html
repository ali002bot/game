<!DOCTYPE html>
<html>
<head>
    <title>Random Hoops: Dual Owner</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #70a1ff; margin: auto; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; 
                   flex-direction: column; justify-content: center; align-items: center; 
                   background: rgba(0,0,0,0.8); color: white; z-index: 10; }
        button { padding: 15px 40px; font-size: 24px; margin: 10px; cursor: pointer; 
                 background: #ff4757; color: white; border: none; border-radius: 10px; font-family: inherit; }
        #score { position: absolute; width: 100%; display: flex; justify-content: space-around; 
                 top: 20px; color: white; font-size: 40px; text-shadow: 3px 3px 0px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="gameContent">
        <div id="score"><div id="p1Text">P1: 0</div><div id="p2Text">P2: 0</div></div>
        <div id="overlay">
            <h1>RANDOM HOOPS</h1>
            <button onclick="startGame(1)">1 PLAYER</button>
            <button onclick="startGame(2)">2 PLAYER</button>
        </div>
        <canvas id="game"></canvas>
    </div>


<script>
// --- REALISTIC SOUND SYSTEM ---
const sounds = {
    bounce: new Audio('https://assets.mixkit.co/active_storage/sfx/2070/2070-preview.mp3'),
    swish: new Audio('https://assets.mixkit.co/active_storage/sfx/2071/2071-preview.mp3'),
    rim: new Audio('https://assets.mixkit.co/active_storage/sfx/2072/2072-preview.mp3'),
    squeak: new Audio('https://assets.mixkit.co/active_storage/sfx/2069/2069-preview.mp3')
};


function play(soundName, volume = 0.4) {
    let s = sounds[soundName].cloneNode();
    s.volume = volume;
    s.play().catch(() => {});
}


const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 1000; canvas.height = 550;


// Global Cheat States
let cheats = { 
    giantBall: false, 
    moonGrav: false, 
    p1Long: false, p2Long: false, 
    p1Speed: false, p2Speed: false 
};


let score1 = 0, score2 = 0, gameActive = false, mode = 1;


class Ball {
    constructor() { this.reset(); }
    reset() {
        this.x = canvas.width / 2; this.y = 100;
        this.vx = (Math.random() - 0.5) * 12; this.vy = 0;
        this.r = cheats.giantBall ? 45 : 15;
    }
    update() {
        let grav = cheats.moonGrav ? 0.15 : 0.45;
        this.vy += grav; this.x += this.vx; this.y += this.vy;
        if (this.y + this.r > canvas.height - 50) { 
            this.y = canvas.height - 50 - this.r; 
            if (Math.abs(this.vy) > 2) play('bounce', 0.3);
            this.vy *= -0.7; 
        }
        if (this.x < 0 || this.x > canvas.width) { this.vx *= -0.8; play('rim', 0.2); }
        if (this.y < 220 && this.vy > 0) {
            if (this.x < 60) { score2++; play('swish', 0.8); this.reset(); }
            if (this.x > canvas.width - 60) { score1++; play('swish', 0.8); this.reset(); }
        }
    }
    draw() {
        ctx.fillStyle = "#ff7f50"; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "black"; ctx.lineWidth = 3; ctx.stroke();
    }
}


class Ragdoll {
    constructor(x, color, side, isCPU = false) {
        this.x = x; this.y = 400; this.vx = 0; this.vy = 0;
        this.angle = 0; this.color = color; this.side = side;
        this.isCPU = isCPU; this.armA = 0;
    }
    jump() {
        if (this.y > canvas.height - 140) {
            play('squeak', 0.15);
            let hasSpeed = (this.side === -1) ? cheats.p1Speed : cheats.p2Speed;
            let pwr = hasSpeed ? -25 : -15;
            this.vy = pwr - Math.random() * 5;
            this.vx = (this.side * -1) * (Math.random() * 12);
            this.angle = (Math.random() - 0.5) * 6;
        }
    }
    update() {
        if (this.isCPU && Math.random() < 0.02) {
            if (ball.x > 500 || Math.abs(this.x - ball.x) < 120) this.jump();
        }
        let grav = cheats.moonGrav ? 0.15 : 0.45;
        this.vy += grav; this.x += this.vx; this.y += this.vy;
        this.angle *= 0.94; this.armA = Math.sin(Date.now() * 0.01) * 2;
        if (this.y > canvas.height - 130) { this.y = canvas.height - 130; this.vy = 0; this.vx *= 0.8; }
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle);
        ctx.fillStyle = "#ffe0bd"; ctx.fillRect(-15, -60, 30, 30);
        ctx.fillStyle = this.color; ctx.fillRect(-20, -30, 40, 60);
        ctx.save(); ctx.translate(this.side*10, -10); ctx.rotate(this.armA);
        ctx.fillStyle = "#ffe0bd"; 
        let hasLong = (this.side === -1) ? cheats.p1Long : cheats.p2Long;
        let armL = hasLong ? 115 : 50;
        ctx.fillRect(0,0,armL,12); ctx.restore();
        ctx.fillStyle = "#333"; ctx.fillRect(-15, 30, 10, 30); ctx.fillRect(5, 30, 10, 30); 
        ctx.restore();
    }
}


let ball, p1, p2;


function startGame(m) {
    mode = m; score1 = 0; score2 = 0;
    ball = new Ball();
    p1 = new Ragdoll(200, "#1e90ff", -1, false);
    p2 = new Ragdoll(800, "#e63946", 1, (mode === 1));
    document.getElementById('overlay').style.display = 'none';
    gameActive = true; loop();
}


function loop() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#2f3542"; ctx.fillRect(0, canvas.height - 40, canvas.width, 40); 
    ctx.fillStyle = "white"; ctx.fillRect(0, 180, 10, 80); ctx.fillRect(canvas.width-10, 180, 10, 80); 
    ctx.fillStyle = "red"; ctx.fillRect(0, 220, 50, 8); ctx.fillRect(canvas.width-50, 220, 50, 8); 


    [p1, p2].forEach(p => {
        p.update(); p.draw();
        let dx = p.x - ball.x; let dy = (p.y-20) - ball.y;
        let hasLong = (p.side === -1) ? cheats.p1Long : cheats.p2Long;
        let reach = hasLong ? 90 : 60;
        if (Math.sqrt(dx*dx + dy*dy) < reach) { 
            play('rim', 0.1); 
            ball.vx = (ball.x - p.x) * 0.8; ball.vy = -12; 
        }
    });


    ball.update(); ball.draw();
    document.getElementById('p1Text').innerText = "P1: " + score1;
    document.getElementById('p2Text').innerText = (mode === 1 ? "CPU: " : "P2: ") + score2;
    requestAnimationFrame(loop);
}


window.addEventListener('keydown', e => {
    if (e.key.toLowerCase() === 'p') { window.location.href = "https://www.google.com"; return; }


    // PLAYER 1 CHEATS
    if (e.key === '1') { cheats.giantBall = !cheats.giantBall; ball.r = cheats.giantBall ? 45 : 15; }
    if (e.key === '2') { cheats.moonGrav = !cheats.moonGrav; }
    if (e.key === '3') { cheats.p1Long = !cheats.p1Long; }
    if (e.key === '4') { cheats.p1Speed = !cheats.p1Speed; }


    // PLAYER 2 CHEATS (Secret Owner Keys)
    if (e.key === '7') { cheats.giantBall = !cheats.giantBall; ball.r = cheats.giantBall ? 45 : 15; }
    if (e.key === '8') { cheats.moonGrav = !cheats.moonGrav; }
    if (e.key === '9') { cheats.p2Long = !cheats.p2Long; }
    if (e.key === '0') { cheats.p2Speed = !cheats.p2Speed; }


    let k = e.key.toLowerCase();
    if (k === 'w' || k === 's') p1.jump();
    if (mode === 2 && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) p2.jump();
});
</script>
</body>
</html>
