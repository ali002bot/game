<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>IXL | Learn</title>
<link rel="icon" href="https://www.ixl.com/favicon.ico"><style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;overflow:hidden}


#dashboard{text-align:center;padding:20px}
.card{
 background:#1e293b;
 padding:15px;
 margin:10px;
 border-radius:10px;
 cursor:pointer;
}


#gameCanvas{
 display:none;
 background:black;
 margin:auto;
}


#hud{
 position:absolute;
 top:10px;
 left:10px;
 font-size:14px;
}


.bar{
 height:10px;
 background:#333;
 border-radius:5px;
 margin:5px 0;
}
.fill{
 height:100%;
 background:lime;
 border-radius:5px;
}


#fakeScreen{
 display:none;
 background:#f5f7fa;
 height:100vh;
 color:black;
}
</style></head>
<body><div id="dashboard">
<h1>IXL Dashboard</h1>
<div class="card">Math Grade: 92%</div>
<div class="card">Science Assignment: Complete</div>
<div class="card">History Notes Updated</div>
</div><div id="fakeScreen">
<div style="background:#4CAF50;height:5px;"></div>
<div style="background:white;padding:20px;border-radius:10px;max-width:800px;margin:auto;margin-top:40px;">
<h3 style="color:#4CAF50;">GG.3 Line plots</h3>
<p>Use the graph to answer.</p>
<input placeholder="Answer..." style="padding:10px;">
</div>
</div><canvas id="gameCanvas" width="800" height="500"></canvas>


<div id="hud">
<div>❤️ Health</div>
<div class="bar"><div id="healthBar" class="fill"></div></div><div>🔫 Ammo</div>
<div class="bar"><div id="ammoBar" class="fill"></div></div><div id="scoreText">🏆 0</div>
</div><script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");


const dashboard = document.getElementById("dashboard");
const fakeScreen = document.getElementById("fakeScreen");


let gameActive = false;
let fakeMode = false;


let player = {x:100,y:200,w:30,h:30,health:100,ammo:10,maxAmmo:10};
let bullets = [];
let enemies = [];
let keys = {};
let score = 0;
let damageCooldown = 0;


// COLLISION
function isColliding(a,b){
 return (
  a.x < b.x + b.w &&
  a.x + a.w > b.x &&
  a.y < b.y + b.h &&
  a.y + a.h > b.y
 );
}


// TOGGLE FAKE
function toggleFake(){
 fakeMode = !fakeMode;


 if(fakeMode){
  dashboard.style.display = "none";
  canvas.style.display = "none";
  fakeScreen.style.display = "block";
 } else {
  dashboard.style.display = "block";
  fakeScreen.style.display = "none";
 }
}


// CONTROLS
window.addEventListener("keydown", e=>{
 keys[e.key] = true;


 if(e.shiftKey && e.key.toLowerCase()==="g"){
  gameActive = true;
  dashboard.style.display = "none";
  canvas.style.display = "block";
 }


 if(e.key === "Escape"){
  gameActive = false;
  dashboard.style.display = "block";
  canvas.style.display = "none";
 }


 if(e.altKey && e.key.toLowerCase()==="a"){
  toggleFake();
 }


 if(e.key === "r"){
  player.ammo = player.maxAmmo;
 }
});


window.addEventListener("keyup", e=>{
 keys[e.key] = false;
});


// SHOOT
window.addEventListener("click", ()=>{
 if(gameActive && player.ammo > 0){
  bullets.push({x:player.x+30,y:player.y,w:10,h:5});
  player.ammo--;
 }
});


// ENEMY SPAWN
setInterval(()=>{
 enemies.push({
  x:800,
  y:Math.random()*470,
  w:30,
  h:30,
  speed:2
 });
},1200);


// UPDATE
function update(){
 if(!gameActive) return;


 if(keys["w"]) player.y -= 4;
 if(keys["s"]) player.y += 4;
 if(keys["a"]) player.x -= 4;
 if(keys["d"]) player.x += 4;


 player.x = Math.max(0, Math.min(770, player.x));
 player.y = Math.max(0, Math.min(470, player.y));


 bullets.forEach(b=>b.x += 8);


 enemies.forEach(e=>{
  let dx = player.x - e.x;
  let dy = player.y - e.y;
  let dist = Math.sqrt(dx*dx + dy*dy) || 1;


  e.x += (dx/dist)*e.speed;
  e.y += (dy/dist)*e.speed;
 });


 // BULLET HIT
 bullets.forEach((b,bi)=>{
  enemies.forEach((e,ei)=>{
   if(isColliding(b,e)){
    enemies.splice(ei,1);
    bullets.splice(bi,1);
    score += 10;
   }
  });
 });


 // DAMAGE
 if(damageCooldown > 0) damageCooldown--;


 enemies.forEach(e=>{
  if(isColliding(player,e) && damageCooldown === 0){
   player.health -= 5;
   damageCooldown = 15;
  }
 });


 // UI
 document.getElementById("healthBar").style.width = player.health + "%";
 document.getElementById("ammoBar").style.width = (player.ammo/player.maxAmmo*100) + "%";
 document.getElementById("scoreText").innerText = "🏆 " + score;


 if(player.health <= 0){
  alert("Game Over! Score: " + score);
  location.reload();
 }
}


// DRAW
function draw(){
 if(!gameActive) return;


 ctx.clearRect(0,0,800,500);


 // PLAYER
 ctx.fillStyle = "#00e5ff";
 ctx.beginPath();
 ctx.arc(player.x+15, player.y+15, 15, 0, Math.PI*2);
 ctx.fill();


 // BULLETS
 ctx.fillStyle = "yellow";
 bullets.forEach(b=>ctx.fillRect(b.x,b.y,10,5));


 // ENEMIES
 ctx.fillStyle = "#ff3b3b";
 enemies.forEach(e=>{
  ctx.beginPath();
  ctx.arc(e.x+15, e.y+15, 15, 0, Math.PI*2);
  ctx.fill();
 });
}


// LOOP
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script></body>
</html>
